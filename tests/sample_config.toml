# https://www.connectionstrings.com/sql-server/
# https://learn.microsoft.com/en-us/dotnet/framework/data/adonet/connection-strings
ado_connection_string = "Server=127.0.0.1,1433;Database=AdventureWorks2022;Integrated Security=True"

# sql query that returns dataset with columns:
# - 'Identifier' string, not null, unique, must use
# - 'HoverInfo' string, nullable, optional
# - 'DefinitionInfo' string, nullable, optional
# - 'DefinitionFileExtension' string, nullable, optional
get_symbols_query = """
select
    s.name as [Identifier],
    case s.type
        when 'P' then 'Stored Procedure: ' + s.name
        when 'U' then 'Table: ' + s.name
        when 'V' then 'View: ' + s.name
        when 'TF' then 'Table Function: ' + s.name
        when 'FN' then 'Scalar Function: ' + s.name
        when 'IF' then 'Inline Table Function: ' + s.name
        else 'Object: ' + s.name
    end as [HoverInfo],
    -- object_definition returns full T-SQL code (nvarchar(max))
    object_definition(s.object_id) as [DefinitionInfo],
    '.sql' as [DefinitionFileExtension]
from sys.objects s
where s.type in (
    'P', -- Stored Procedures
    'U', -- Tables
    'V', -- Views
    'TF', -- Table Functions
    'FN', -- Scalar Functions
    'IF'  -- Inline Table Functions
)
order by [DefinitionInfo] desc, [Identifier];
"""

# injection protection for get_symbols_query, update_symbol_query generated by 'sign <CONFIG_FILE>' command
# you should manual sign config file after change get_symbols_query, update_symbol_query option via cli app (see --help)
sign = "7168ae6580b3b94d4849dc45ea3e78fbcc8f45aac52577612a6d39a23512adc5"

# optional properties:

trust_cert = true # if set, the server certificate will not be validated and it is accepted as-is (dafault false)
case_sensitive = false # search Identifier with case sensitive in every DefinitionInfo or not (default true)
symbols_highlight = true # set symbols highlight (default false)

# like get_symbols_query but its calls on definition request for refetch symbol info (default not set)
# {{SYMBOL}} literal will be replaced with client parameter by definition request
update_symbol_query = "select ... where Idetifier = '{{SYMBOL}}'"

