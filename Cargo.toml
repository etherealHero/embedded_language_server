[package]
name = "lsp_proxy"
version = "0.1.0"
edition = "2024"
rust-version = "1.95"

[dependencies.async-lsp]
version = "0.2.3"
features = [
    "async-io",
    "client-monitor",
    "default",
    "forward",
    "omni-trait",
    "stdio",
    "tokio",
    "tracing",
]

[dependencies.tracing]
version = "0.1.37"

[dependencies.tracing-subscriber]
version = "0.3.16"

[dependencies.async-process]
version = "2"

[dependencies.futures]
version = "0.3.28"
features = ["async-await", "std"]
default-features = false

[dependencies.tower]
version = "0.5"

[dependencies.tokio]
version = "1.27.0"
features = ["io-std", "io-util", "macros", "process", "rt", "time"]

[dependencies.tokio-util]
version = "0.7.8"
features = ["compat"]


[dependencies.clap]
version = "4.6.1"
features = ["cargo"]


[dependencies.deadpool-tiberius]
version = "0.1.9"
